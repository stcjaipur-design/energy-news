<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0b5cad">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Energy News by Gaurav">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Energy News by Gaurav</title>
<style>
:root{
  color-scheme: light;
  --bg:#f6f7f9; --card:#ffffff; --ink:#12181f; --muted:#5c6773; --line:#e6e9ee;
  --accent:#0b5cad;
  --crude:#b45309; --crude-bg:#fdf2e3;
  --base:#0e7a5f; --base-bg:#e4f5ee;
  --ref:#6d28d9; --ref-bg:#efe9fd;
  --geo:#b91c1c; --geo-bg:#fdeaea;
  --co:#1d4ed8; --co-bg:#e7edfd;
  --india:#c1121f; --india-bg:#fde8ea;
  --save:#a15c00;
  --radius:12px;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.45}
.wrap{max-width:920px;margin:0 auto;padding:18px 16px 60px}
header h1{font-size:19px;margin:0 0 3px;font-weight:700;letter-spacing:-.2px}
header p{margin:0;color:var(--muted);font-size:12.5px}
.status{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:999px;margin-top:8px;border:1px solid var(--line);background:#fff;color:var(--muted)}
.dot{width:7px;height:7px;border-radius:50%;background:#c9ced6}
.dot.live{background:#1a9e5f}.dot.loading{background:#e0a400;animation:pulse 1s infinite}.dot.cached{background:#e0a400}
@keyframes pulse{50%{opacity:.35}}
.controls{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:16px 0 6px}
.tabs{display:flex;flex-wrap:wrap;gap:6px}
.tab{border:1px solid var(--line);background:var(--card);color:var(--muted);padding:6px 13px;border-radius:999px;cursor:pointer;font-size:13px;font-weight:600;transition:.12s}
.tab:hover{border-color:#c7ced8}
.tab.active{background:var(--accent);border-color:var(--accent);color:#fff}
.tab.saved.active{background:var(--save);border-color:var(--save)}
.tab .n{opacity:.7;font-weight:500;margin-left:4px}
.spacer{flex:1 1 auto}
.search{border:1px solid var(--line);background:var(--card);border-radius:8px;padding:6px 10px;font-size:13px;min-width:150px;color:var(--ink)}
.search:focus{outline:none;border-color:var(--accent)}
.toggle{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;color:var(--muted);cursor:pointer;user-select:none;white-space:nowrap}
.toggle input{accent-color:var(--accent)}
.meta{color:var(--muted);font-size:12px;margin:2px 0 12px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.list{display:flex;flex-direction:column;gap:9px}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:12px 14px;transition:.12s}
.card:hover{border-color:#cdd4dd;box-shadow:0 1px 4px rgba(20,30,50,.05)}
.card.read{opacity:.55;background:#fbfcfd}
.card.saved-card{border-color:#e8cf9e;box-shadow:0 0 0 1px #f0dcae inset}
.card .top{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:5px}
.badge{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;padding:2px 7px;border-radius:5px;white-space:nowrap}
.b-crude{color:var(--crude);background:var(--crude-bg)}
.b-base{color:var(--base);background:var(--base-bg)}
.b-ref{color:var(--ref);background:var(--ref-bg)}
.b-geo{color:var(--geo);background:var(--geo-bg)}
.b-co{color:var(--co);background:var(--co-bg)}
.b-india{color:var(--india);background:var(--india-bg)}
.chip{font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:5px;white-space:nowrap;color:#0b3ea8;background:#fff;border:1px solid #b9cbf3}
.src{font-size:11.5px;color:var(--muted);font-weight:600}
.date{font-size:11.5px;color:var(--muted);margin-left:auto}
.card a.title{color:var(--ink);text-decoration:none;font-weight:600;font-size:14.5px;display:block;line-height:1.35}
.card a.title:hover{color:var(--accent);text-decoration:underline}
.card.read a.title{text-decoration:line-through;text-decoration-color:#b9c0c9}
.card .sum{color:var(--muted);font-size:12.5px;margin-top:4px}
.actions{display:flex;gap:5px;margin-top:9px;flex-wrap:wrap;align-items:center}
.act{border:1px solid var(--line);background:#fff;color:var(--muted);font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:6px;cursor:pointer;transition:.1s}
.act:hover{border-color:#b9c0c9;color:var(--ink)}
.act.on{border-color:transparent}
.act.read.on{background:#e7f3ec;color:#137a45}
.act.save.on{background:#fbf0d8;color:var(--save)}
.act.del:hover{background:#fdeaea;color:#b91c1c;border-color:#f3c4c4}
a.act{text-decoration:none;display:inline-flex;align-items:center}
.act.share{color:#0a7d3c;border-color:#bfe4cd}
.act.share:hover{background:#e7f6ec;color:#0a7d3c}
.act.copy.done{background:#e7f3ec;color:#137a45;border-color:transparent}
.countdown{font-size:10.5px;color:#a15c00;margin-left:2px}
.empty{text-align:center;color:var(--muted);padding:40px 10px;font-size:13.5px}
.srcrow{display:flex;flex-wrap:wrap;gap:6px 14px;margin-top:22px;padding-top:12px;border-top:1px solid var(--line);font-size:11.5px;color:var(--muted)}
.srcrow b{color:var(--ink);font-weight:600}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Energy News by Gaurav</h1>
    <p>Headlines across crude, base oil, refining, the geopolitics moving them, and your company watchlist. Hit Reload (top-right) for the newest.</p>
    <div class="status" id="status"><span class="dot loading"></span><span id="statusText">Loading…</span></div>
    <span class="status" id="syncPill" style="display:none;margin-left:6px;color:#137a45;border-color:#bfe4cd"></span>
  </header>

  <div class="controls"><div class="tabs" id="tabs"></div></div>
  <div class="controls" style="margin-top:0">
    <input class="search" id="search" type="text" placeholder="Filter headlines…" autocomplete="off">
    <label class="toggle"><input type="checkbox" id="watchOnly"> Watchlist only</label>
    <label class="toggle"><input type="checkbox" id="indiaOnly"> India only</label>
    <label class="toggle"><input type="checkbox" id="hideRead"> Hide read</label>
    <span class="spacer"></span>
    <button class="act" id="syncBtn" title="Set up cross-device sync">⚙ Sync setup</button>
  </div>
  <div class="controls" id="companyBar" style="margin-top:0;gap:6px 12px"></div>

  <div class="meta" id="meta"></div>
  <div id="content"></div>

  <div class="srcrow">
    <span><b>Sources:</b></span>
    <span>OilPrice.com — crude, geopolitics &amp; company news</span>
    <span>Hydrocarbon Processing — refining</span>
    <span>Lubes'n'Greases — base oil</span>
  </div>
</div>

<script>
const SEED = __SEED__;

const CRUDE_RE=/\b(crude|brent|wti|opec|oil price|barrel|bpd|hormuz|tanker|petroleum|naphtha|diesel|gasoline|lng|shale|export|import|inventor|supply|output|murban|dubai|stockpile)\b/i;
const BASE_RE=/\b(base oil|base stock|base-oil|basestock|group i|group ii|group iii|group iv|rerefined|re-refined|rrbo|lubricant|lube|paraffinic|naphthenic|viscosity|ester)\b/i;
const REF_RE=/\b(refin|refiner|refinery|refineries|downstream|crude unit|cdu|petrochem|cracker|catalyst|hydrocrack|desulfur|throughput|turnaround|complex|upgrad|methanol)\b/i;
const GEO_RE=/\b(war|iran|israel|russia|russian|ukraine|opec|sanction|hormuz|ceasefire|cease-fire|strike|conflict|blockade|attack|geopolit|tariff|embargo|drone|military|tension|peace (deal|talks)|red sea|houthi|venezuela|nuclear|trump|putin|zelensky|navy|missile)\b/i;
const INDIA_RE=/\b(india|indian|iocl|ioc|bpcl|hpcl|reliance|nayara|ongc|jamnagar|numaligarh|paradip|mangalore|cpcl|bharat petroleum|hindustan petroleum|indian oil|mrpl)\b/i;
// company watchlist
const WATCH=[
  ['ExxonMobil',/\b(exxonmobil|exxon)\b/i],
  ['Shell',/\bshell\b/i],
  ['Castrol',/\bcastrol\b/i],
  ['BP',/\bbp\b/i],
  ['IOCL',/\b(iocl|indian ?oil)\b/i],
  ['HPCL',/\b(hpcl|hindustan petroleum)\b/i],
  ['BPCL',/\b(bpcl|bharat petroleum)\b/i]
];

function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function cleanTitle(t){return (t||'').replace(/\s+/g,' ').replace(/&amp;/g,'&').trim();}
function keyOf(a){return String(a&&a.title||a&&a.url||'').toLowerCase().replace(/[^a-z0-9]+/g,' ').trim().slice(0,90);}
function parseDate(s){
  if(!s) return null;
  if(s instanceof Date) return isNaN(s)?null:s;
  s=String(s).trim();
  let m=s.match(/^(\d{4})-(\d{2})-(\d{2})/); if(m){const d=new Date(+m[1],+m[2]-1,+m[3],12);return isNaN(d)?null:d;}
  m=s.match(/([A-Za-z]{3,9})\s+(\d{1,2}),?\s+(\d{4})/); if(m){const d=new Date(m[1]+' '+m[2]+', '+m[3]);if(!isNaN(d))return d;}
  m=s.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/); if(m){const d=new Date(+m[3],+m[1]-1,+m[2],12);if(!isNaN(d))return d;}
  return null;
}
function relTime(d){if(!d)return '';const days=Math.floor((Date.now()-d.getTime())/86400000);if(days<=0)return 'today';if(days===1)return 'yesterday';if(days<30)return days+'d ago';return Math.floor(days/30)+'mo ago';}
function fmtDate(d){return d?d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'';}

function detectWatch(t){const out=[];for(const [n,re] of WATCH){if(re.test(t))out.push(n);}return out;}

function categorize(a){
  const t=a.title; const tags=[];
  if(a.cat==='crude'||a.cat==='base'||a.cat==='ref') tags.push(a.cat);
  if(a.geo||GEO_RE.test(t)) tags.push('geo');
  if(a.src==="Lubes'n'Greases"||BASE_RE.test(t)) tags.push('base');
  if(REF_RE.test(t)) tags.push('ref');
  if(CRUDE_RE.test(t)) tags.push('crude');
  a.watch=detectWatch(t);
  if(a.co||a.watch.length) tags.push('co');
  const nonGeoCo=tags.filter(x=>x!=='geo'&&x!=='co').length;
  if(a.src==='OilPrice'&&!nonGeoCo) tags.push('crude');
  if(a.src==='Hydrocarbon Processing'&&!tags.includes('ref')&&!tags.includes('crude')) tags.push('ref');
  if(!tags.length) tags.push('crude');
  a.tags=[...new Set(tags)]; a.india=INDIA_RE.test(t); a.d=parseDate(a.date);
  return a;
}

// ---- persistent per-item state (with optional cross-device sync) ----
const LS_KEY='enw_state_v2';
let STATE={};
try{STATE=JSON.parse(localStorage.getItem(LS_KEY)||'{}');}catch(e){STATE={};}
const TWO_DAYS=2*86400000;
// ==== Supabase sync config (set in-app via the "Sync setup" button) ====
let SUPA_URL='', SUPA_KEY='', SYNC_ID='gaurav-energy';
try{SUPA_URL=localStorage.getItem('enw_supa_url')||'';SUPA_KEY=localStorage.getItem('enw_supa_key')||'';SYNC_ID=localStorage.getItem('enw_sync_id')||'gaurav-energy';}catch(e){}
let SYNC_ON=/^https?:\/\//.test(SUPA_URL)&&SUPA_KEY.length>20;
function openSyncSettings(){
  const url=prompt('1/3  Supabase Project URL (looks like https://xxxx.supabase.co):', SUPA_URL||'');
  if(url===null) return;
  const key=prompt('2/3  Supabase anon public key (a long string starting with eyJ...):', SUPA_KEY||'');
  if(key===null) return;
  const code=prompt('3/3  Sync code — type the SAME word on every device so they share:', SYNC_ID||'gaurav-energy')||'gaurav-energy';
  try{localStorage.setItem('enw_supa_url',(url||'').trim());localStorage.setItem('enw_supa_key',(key||'').trim());localStorage.setItem('enw_sync_id',(code||'gaurav-energy').trim());}catch(e){}
  alert('Sync settings saved. The app will reload and start syncing.');
  location.reload();
}
let pushTimer=null;
function saveLocal(){try{localStorage.setItem(LS_KEY,JSON.stringify(STATE));}catch(e){}}
function saveState(){saveLocal();pushRemote();}
function st(u){return STATE[u]||(STATE[u]={});}
function touch(u){st(u).m=Date.now();}
function isRead(u){return !!(STATE[u]&&STATE[u].r);}
function isSaved(u){return !!(STATE[u]&&STATE[u].s);}
function isDeleted(u){return !!(STATE[u]&&STATE[u].d);}
function purge(){let ch=false;const now=Date.now();for(const u in STATE){const s=STATE[u];if(s&&s.r&&!s.d&&(now-s.r>TWO_DAYS)){s.d=now;s.m=now;ch=true;}}if(ch)saveState();}
function mergeRemote(remote){if(!remote||typeof remote!=='object')return false;let ch=false;for(const u in remote){const rv=remote[u]||{};const lv=STATE[u];if(!lv||(rv.m||0)>(lv.m||0)){STATE[u]=rv;ch=true;}}return ch;}
function setSync(s){const el=document.getElementById('syncPill');if(!el)return;if(!SYNC_ON){el.style.display='none';return;}el.style.display='inline-flex';el.textContent=s==='sync'?'⟳ Syncing…':s==='err'?'⚠ Sync offline':'✓ Synced across devices';}
async function pullRemote(){if(!SYNC_ON)return;try{const r=await fetch(SUPA_URL+'/rest/v1/enw_state?id=eq.'+encodeURIComponent(SYNC_ID)+'&select=value',{headers:{apikey:SUPA_KEY,Authorization:'Bearer '+SUPA_KEY}});if(!r.ok){setSync('err');return;}const rows=await r.json();const remote=rows&&rows[0]&&rows[0].value;if(mergeRemote(remote)){saveLocal();render();}setSync('ok');}catch(e){setSync('err');}}
function pushRemote(){if(!SYNC_ON)return;clearTimeout(pushTimer);pushTimer=setTimeout(async()=>{try{setSync('sync');const r=await fetch(SUPA_URL+'/rest/v1/enw_state',{method:'POST',headers:{apikey:SUPA_KEY,Authorization:'Bearer '+SUPA_KEY,'Content-Type':'application/json',Prefer:'resolution=merge-duplicates,return=minimal'},body:JSON.stringify([{id:SYNC_ID,value:STATE,updated_at:new Date().toISOString()}])});setSync(r.ok?'ok':'err');}catch(e){setSync('err');}},700);}

// ---- live parsers ----
function parseOilPriceList(text,base){const out=[];const seen=new Set();const re=/##\s*\[([^\]]+)\]\((https:\/\/oilprice\.com\/[^)]+)\)\s*\n+\s*([A-Za-z]{3,9}\s+\d{1,2},\s*\d{4})/g;let m;while((m=re.exec(text))){if(seen.has(m[2]))continue;seen.add(m[2]);const it={title:cleanTitle(m[1]),url:m[2],date:m[3],src:base};if(/\/Geopolitics\//.test(m[2])){it.src='OilPrice Geopolitics';it.geo=true;}else if(/\/Company-News\//.test(m[2])){it.src='OilPrice Company News';it.co=true;}out.push(it);}return out;}
function parseCompany(text){const out=[];const seen=new Set();const re=/##\s*\[([^\]]+)\]\((https:\/\/oilprice\.com\/Company-News\/[^)]+)\)[\s\S]{0,500}?([A-Za-z]{3,9}\s+\d{1,2},\s*\d{4})\s+at/g;let m;while((m=re.exec(text))){if(seen.has(m[2]))continue;seen.add(m[2]);out.push({title:cleanTitle(m[1]),url:m[2],date:m[3],src:'OilPrice Company News',co:true});}return out;}
function parseHP(text){const out=[];const seen=new Set();const re=/(\d{1,2}\/\d{1,2}\/\d{4})\s*\n+##\s*\[([^\]]+)\]\((https:\/\/www\.hydrocarbonprocessing\.com\/news\/[^)]+)\)/g;let m;while((m=re.exec(text))){if(seen.has(m[3]))continue;seen.add(m[3]);out.push({title:cleanTitle(m[2]),url:m[3],date:m[1],src:'Hydrocarbon Processing'});}return out;}
function parseLube(text){const out=[];const seen=new Set();const re=/###\s*\[([^\]]+)\]\((https:\/\/www\.lubesngreases\.com\/[^)]+)\)\s*\n+####\s*([A-Za-z]{3,9}\s+\d{1,2},\s*\d{4})(?:\s*\n+([^\n#]+))?/g;let m;while((m=re.exec(text))){if(seen.has(m[2]))continue;seen.add(m[2]);let sum=(m[4]||'').trim();if(sum.length>160)sum=sum.slice(0,157)+'…';out.push({title:cleanTitle(m[1]),url:m[2],date:m[3],src:"Lubes'n'Greases",sum});}return out;}

const SOURCES=[
  {url:'https://oilprice.com/Latest-Energy-News/World-News/',parse:t=>parseOilPriceList(t,'OilPrice')},
  {url:'https://oilprice.com/Geopolitics/',parse:t=>parseOilPriceList(t,'OilPrice Geopolitics')},
  {url:'https://oilprice.com/Company-News/',parse:parseCompany},
  {url:'https://www.hydrocarbonprocessing.com/news',parse:parseHP},
  {url:'https://www.lubesngreases.com/category/base-stocks/',parse:parseLube}
];

let ALL=[],TAB='all',Q='',INDIA=false,HIDEREAD=false,WATCHONLY=false;
let COMPANY_FILTER=new Set();

function setStatus(cls,text){const s=document.getElementById('status');s.querySelector('.dot').className='dot '+cls;document.getElementById('statusText').textContent=text;}
function tagBadge(t){return t==='crude'?'<span class="badge b-crude">Crude</span>':t==='base'?'<span class="badge b-base">Base Oil</span>':t==='ref'?'<span class="badge b-ref">Refinery</span>':t==='geo'?'<span class="badge b-geo">Geopolitics</span>':t==='co'?'<span class="badge b-co">Company</span>':'';}

function visible(){return ALL.filter(a=>!isDeleted(keyOf(a)));}

function render(){
  purge();
  const content=document.getElementById('content');
  const base=visible();
  const counts={all:0,crude:0,base:0,ref:0,geo:0,co:0,saved:0};
  base.forEach(a=>{if(isSaved(keyOf(a))){counts.saved++;return;}if(isRead(keyOf(a)))return;counts.all++;a.tags.forEach(t=>{if(counts[t]!=null)counts[t]++;});});
  document.querySelectorAll('.tab').forEach(t=>{const k=t.dataset.k;t.querySelector('.n').textContent=counts[k]!=null?counts[k]:0;});

  let items=base.slice();
  if(TAB==='saved') items=items.filter(a=>isSaved(keyOf(a)));
  else {items=items.filter(a=>!isSaved(keyOf(a))); if(TAB!=='all') items=items.filter(a=>a.tags.includes(TAB));}
  if(WATCHONLY) items=items.filter(a=>a.watch&&a.watch.length);
  if(COMPANY_FILTER.size) items=items.filter(a=>a.watch&&a.watch.some(w=>COMPANY_FILTER.has(w)));
  if(INDIA) items=items.filter(a=>a.india);
  if(HIDEREAD) items=items.filter(a=>!isRead(keyOf(a)));
  if(Q){const q=Q.toLowerCase();items=items.filter(a=>a.title.toLowerCase().includes(q));}

  items.sort((a,b)=>{
    const ra=isRead(keyOf(a))?1:0, rb=isRead(keyOf(b))?1:0;
    if(ra!==rb) return ra-rb;
    if(a.d&&b.d) return b.d-a.d;
    if(a.d) return -1; if(b.d) return 1; return 0;
  });

  const readCount=base.filter(a=>isRead(keyOf(a))).length;
  const parts=['<span>'+items.length+' shown</span>'];
  if(readCount) parts.push('<span>· '+readCount+' read (auto-delete after 2 days)</span>');
  if(counts.saved) parts.push('<span>· '+counts.saved+' saved</span>');
  document.getElementById('meta').innerHTML=parts.join('');

  if(!items.length){content.innerHTML='<div class="empty">Nothing here right now.</div>';return;}
  content.innerHTML='<div class="list">'+items.map(a=>{
    const u=esc(a.url); const k=esc(keyOf(a)); const read=isRead(keyOf(a)), saved=isSaved(keyOf(a));
    let badges=a.tags.map(tagBadge).join('');
    if(a.watch&&a.watch.length) badges+=a.watch.map(w=>'<span class="chip">'+esc(w)+'</span>').join('');
    if(a.india) badges+='<span class="badge b-india">India</span>';
    const dt=a.d?('<span class="date">'+fmtDate(a.d)+' · '+relTime(a.d)+'</span>'):'<span class="date"></span>';
    const sum=a.sum?('<div class="sum">'+esc(a.sum)+'</div>'):'';
    let cd='';
    if(read){const left=TWO_DAYS-(Date.now()-STATE[keyOf(a)].r);const d=Math.max(1,Math.ceil(left/86400000));cd='<span class="countdown">auto-deletes in '+d+'d</span>';}
    const wa='https://wa.me/?text='+encodeURIComponent(a.title+' — '+a.url);
    return '<div class="card'+(read?' read':'')+(saved?' saved-card':'')+'">'+
      '<div class="top">'+badges+'<span class="src">'+esc(a.src)+'</span>'+dt+'</div>'+
      '<a class="title" href="'+u+'" target="_blank" rel="noopener">'+esc(a.title)+'</a>'+sum+
      '<div class="actions">'+
        '<button class="act read'+(read?' on':'')+'" data-act="read" data-key="'+k+'">'+(read?'✓ Read':'Mark read')+'</button>'+
        '<button class="act save'+(saved?' on':'')+'" data-act="save" data-key="'+k+'">'+(saved?'★ Saved':'☆ Save')+'</button>'+
        '<a class="act share" href="'+esc(wa)+'" target="_blank" rel="noopener" title="Share on WhatsApp">↗ WhatsApp</a>'+
        '<button class="act copy" data-act="copy" data-url="'+u+'" data-title="'+esc(a.title)+'">🔗 Copy link</button>'+
        '<button class="act del" data-act="del" data-key="'+k+'">✕ Delete</button>'+
        cd+
      '</div></div>';
  }).join('')+'</div>';
}

document.addEventListener('click',e=>{
  const b=e.target.closest('.act'); if(!b)return;
  const act=b.dataset.act; if(!act) return; // e.g. WhatsApp anchor
  if(act==='copy'){
    const u=b.dataset.url;
    const txt=(b.dataset.title||'')+' — '+u;
    const done=()=>{const o=b.textContent;b.textContent='✓ Copied';b.classList.add('done');setTimeout(()=>{b.textContent=o;b.classList.remove('done');},1500);};
    try{navigator.clipboard.writeText(txt).then(done,()=>{prompt('Copy this link:',txt);});}
    catch(err){prompt('Copy this link:',txt);}
    return;
  }
  const k=b.dataset.key;
  if(act==='read'){const s=st(k);if(s.r)delete s.r;else s.r=Date.now();}
  else if(act==='save'){const s=st(k);s.s=!s.s;if(!s.s)delete s.s;}
  else if(act==='del'){st(k).d=Date.now();}
  touch(k); saveState(); render();
});

function ingest(list){
  const byUrl=new Map(); ALL.forEach(a=>byUrl.set(a.url,a));
  list.forEach(a=>{categorize(a);byUrl.set(a.url,a);});
  ALL=Array.from(byUrl.values());
}

function buildCompanyBar(){
  const el=document.getElementById('companyBar'); if(!el) return;
  el.innerHTML='<span style="font-size:12px;color:var(--muted);font-weight:600">Companies:</span>'+
    WATCH.map(function(w){return '<label class="toggle"><input type="checkbox" class="cofilter" value="'+w[0]+'"> '+w[0]+'</label>';}).join('');
  el.querySelectorAll('.cofilter').forEach(function(c){c.addEventListener('change',function(){
    COMPANY_FILTER=new Set(); el.querySelectorAll('.cofilter:checked').forEach(function(x){COMPANY_FILTER.add(x.value);}); render();
  });});
}
function buildTabs(){
  const defs=[['all','All'],['crude','Crude'],['base','Base Oil'],['ref','Refineries'],['geo','Geopolitics'],['co','Companies'],['saved','Saved']];
  const el=document.getElementById('tabs');
  el.innerHTML=defs.map(([k,l],i)=>'<div class="tab'+(k==='saved'?' saved':'')+(i===0?' active':'')+'" data-k="'+k+'">'+l+'<span class="n"></span></div>').join('');
  el.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{el.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');TAB=t.dataset.k;render();}));
}

async function liveRefresh(){
  if(!(window.cowork&&window.cowork.callMcpTool)){setStatus('cached','Showing saved snapshot');return;}
  setStatus('loading','Checking for newer headlines…');
  let ok=0;
  await Promise.all(SOURCES.map(async s=>{
    try{
      const r=await window.cowork.callMcpTool('mcp__workspace__web_fetch',{url:s.url});
      let text='';
      if(r){if(Array.isArray(r.content)&&r.content[0]&&r.content[0].text)text=r.content[0].text;else if(typeof r.content==='string')text=r.content;else if(r.structuredContent)text=typeof r.structuredContent==='string'?r.structuredContent:JSON.stringify(r.structuredContent);}
      if(text&&text.length>200){const items=s.parse(text);if(items.length){ingest(items);ok++;}}
    }catch(e){}
  }));
  render();
  if(ok>0) setStatus('live','Refreshed live · '+new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}));
  else setStatus('cached','Showing saved snapshot (live refresh unavailable)');
}

function init(){
  buildTabs();
  document.getElementById('search').addEventListener('input',e=>{Q=e.target.value.trim();render();});
  document.getElementById('watchOnly').addEventListener('change',e=>{WATCHONLY=e.target.checked;render();});
  document.getElementById('indiaOnly').addEventListener('change',e=>{INDIA=e.target.checked;render();});
  document.getElementById('hideRead').addEventListener('change',e=>{HIDEREAD=e.target.checked;render();});
  const sb=document.getElementById('syncBtn'); if(sb) sb.addEventListener('click',openSyncSettings);
  buildCompanyBar();
  ALL=SEED.map(a=>categorize(Object.assign({},a)));
  render();
  setStatus('cached','Loaded '+visible().length+' saved headlines');
  liveRefresh();
  if(SYNC_ON){setSync('ok');pullRemote();setInterval(pullRemote,45000);window.addEventListener('focus',pullRemote);document.addEventListener('visibilitychange',()=>{if(!document.hidden)pullRemote();});}
}
init();
</script>
<script>if('serviceWorker' in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('sw.js?v=__VER__').catch(()=>{});});}</script>
